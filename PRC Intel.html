<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRC Data & Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script>
  (function(){
    var t = localStorage.getItem('prc-theme');
    if (t && t !== 'gold') document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-weight: 300; overflow-x: hidden; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

/* THEMES */
:root {
  --bg: #09112a;
  --bg2: #0d1835;
  --bg3: #111f42;
  --accent: #c9a84c;
  --accent2: #e8c76a;
  --text: #e8e4dc;
  --text-dim: #8a8478;
  --text-mid: #b8b0a0;
  --border: rgba(201,168,76,0.18);
  --border-dim: rgba(255,255,255,0.06);
  --nav-blur: rgba(9,17,42,0.88);
}
[data-theme="noir"] {
  --bg: #070a10;
  --bg2: #0c1018;
  --bg3: #111820;
  --accent: #4db8d4;
  --accent2: #7ed6e8;
  --text: #e2ecf0;
  --text-dim: #5a7a84;
  --text-mid: #9ab4bc;
  --border: rgba(77,184,212,0.18);
  --border-dim: rgba(255,255,255,0.06);
  --nav-blur: rgba(7,10,16,0.88);
}
[data-theme="slate"] {
  --bg: #0b0e17;
  --bg2: #101420;
  --bg3: #161c2e;
  --accent: #7c8fff;
  --accent2: #a4b0ff;
  --text: #e4e6f0;
  --text-dim: #5a5f7a;
  --text-mid: #9098b8;
  --border: rgba(124,143,255,0.18);
  --border-dim: rgba(255,255,255,0.06);
  --nav-blur: rgba(11,14,23,0.88);
}
[data-theme="platino"] {
  --bg: #f4f3f1;
  --bg2: #eceae6;
  --bg3: #e2dfda;
  --accent: #4a5058;
  --accent2: #2e3138;
  --text: #18191c;
  --text-dim: #9a9d9f;
  --text-mid: #52575e;
  --border: rgba(74,80,88,0.22);
  --border-dim: rgba(0,0,0,0.07);
  --nav-blur: rgba(244,243,241,0.94);
}

/* TYPOGRAPHY */
.serif { font-family: 'Cormorant Garamond', Georgia, serif; }

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 60px; height: 72px;
  background: var(--nav-blur); -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-dim);
  transition: all 0.4s;
}
nav.scrolled { height: 60px; }
.nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; }
.nav-links { display: flex; gap: 40px; }
.nav-links a { color: var(--text-mid); font-size: 12px; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; transition: color 0.3s; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.nav-links a:hover { color: var(--accent); }
.nav-cta { -webkit-appearance: none; background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 8px 24px; font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: all 0.3s; -webkit-tap-highlight-color: transparent; }
.nav-cta:hover { background: var(--accent); color: var(--bg); }

/* REVEAL */
.reveal { opacity: 0; transform: translateY(32px); transition: opacity 0.8s cubic-bezier(.16,1,.3,1), transform 0.8s cubic-bezier(.16,1,.3,1); }
.reveal.visible { opacity: 1; transform: none; }
.reveal-delay-1 { transition-delay: 0.1s; }
.reveal-delay-2 { transition-delay: 0.2s; }
.reveal-delay-3 { transition-delay: 0.3s; }
.reveal-delay-4 { transition-delay: 0.4s; }

/* HERO */
.hero {
  min-height: 100vh;
  min-height: -webkit-fill-available;
  min-height: 100svh;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  background: radial-gradient(ellipse 80% 60% at 60% 40%, var(--bg3) 0%, var(--bg) 70%);
}
.hero-grid {
  position: absolute; inset: 0; pointer-events: none;
  background-image: linear-gradient(var(--border-dim) 1px, transparent 1px), linear-gradient(90deg, var(--border-dim) 1px, transparent 1px);
  background-size: 80px 80px;
  -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
}
.hero-content { text-align: center; z-index: 1; padding: 0 20px; }
.hero-eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); margin-bottom: 28px; }
.hero-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(72px, 10vw, 130px); font-weight: 300; line-height: 0.92; color: var(--text); margin-bottom: 12px; }
.hero-title em { font-style: italic; color: var(--accent); }
.hero-subtitle { font-family: 'Cormorant Garamond', serif; font-size: clamp(22px, 3vw, 34px); font-weight: 300; font-style: italic; color: var(--text-mid); margin-bottom: 56px; letter-spacing: 0.02em; }
.hero-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.btn-primary { -webkit-appearance: none; background: var(--accent); color: var(--bg); padding: 14px 40px; font-size: 11px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; border: none; cursor: pointer; transition: all 0.3s; -webkit-tap-highlight-color: transparent; }
.btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
.btn-outline { -webkit-appearance: none; background: transparent; border: 1px solid var(--border); color: var(--text); padding: 14px 40px; font-size: 11px; font-weight: 400; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: all 0.3s; -webkit-tap-highlight-color: transparent; }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.hero-scroll { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--text-dim); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; }
.scroll-line { width: 1px; height: 50px; background: linear-gradient(var(--accent), transparent); animation: scrollpulse 2s ease-in-out infinite; }
@keyframes scrollpulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

/* SECTION BASE */
section { padding: 120px 60px; }
.section-label { font-size: 10px; font-weight: 500; letter-spacing: 0.35em; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; }
.section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(42px, 6vw, 76px); font-weight: 300; line-height: 1.05; color: var(--text); }
.section-title em { font-style: italic; color: var(--accent); }
.section-divider { width: 48px; height: 1px; background: var(--accent); margin: 32px 0; opacity: 0.6; }
.body-text { font-size: 15px; font-weight: 300; line-height: 1.85; color: var(--text-mid); max-width: 560px; }

/* ABOUT */
.about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 100px; align-items: start; max-width: 1200px; margin: 0 auto; }
.objectives-list { list-style: none; display: flex; flex-direction: column; gap: 24px; margin-top: 40px; }
.obj-item { display: flex; gap: 20px; align-items: flex-start; padding: 24px; border: 1px solid var(--border-dim); transition: border-color 0.3s, background 0.3s; }
.obj-item:hover { border-color: var(--border); background: rgba(255,255,255,0.02); }
.obj-num { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; color: var(--accent); opacity: 0.5; line-height: 1; min-width: 32px; }
.obj-text { font-size: 14px; font-weight: 300; color: var(--text-mid); line-height: 1.7; }

/* SERVICES */
.services-section { background: var(--bg2); }
.services-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px; margin-top: 60px; max-width: 1200px; margin-left: auto; margin-right: auto; }
.service-card { background: var(--bg); padding: 48px; cursor: pointer; transition: background 0.3s; position: relative; overflow: hidden; border: 1px solid var(--border-dim); }
.service-card::before { content:''; position: absolute; top:0; left:0; right:0; height: 2px; background: var(--accent); transform: scaleX(0); transform-origin: left; transition: transform 0.4s cubic-bezier(.16,1,.3,1); }
.service-card:hover::before, .service-card.active::before { transform: scaleX(1); }
.service-card:hover, .service-card.active { background: var(--bg3); }
.service-tag { font-size: 10px; font-weight: 500; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
.service-name { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; color: var(--text); margin-bottom: 16px; line-height: 1.1; }
.service-summary { font-size: 14px; color: var(--text-dim); line-height: 1.7; }
.service-expand { overflow: hidden; max-height: 0; transition: max-height 0.5s cubic-bezier(.16,1,.3,1); }
.service-expand.open { max-height: 400px; }
.service-detail { padding-top: 24px; border-top: 1px solid var(--border-dim); margin-top: 24px; }
.service-detail ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.service-detail li { font-size: 13px; font-weight: 300; color: var(--text-mid); padding-left: 16px; position: relative; }
.service-detail li::before { content:'—'; position: absolute; left: 0; color: var(--accent); opacity: 0.6; }
.service-arrow { position: absolute; bottom: 24px; right: 24px; font-size: 20px; color: var(--accent); opacity: 0.4; transition: all 0.3s; }
.service-card:hover .service-arrow { opacity: 1; transform: translate(2px, -2px); }

/* PHILOSOPHY */
.phil-header { max-width: 600px; margin-bottom: 80px; }
.pillars { display: flex; gap: 0; max-width: 1200px; margin: 0 auto; position: relative; }
.pillar { flex: 1; padding: 40px 32px 40px; border-left: 1px solid var(--border-dim); position: relative; transition: background 0.3s; }
.pillar:hover { background: var(--bg2); }
.pillar-num { font-family: 'Cormorant Garamond', serif; font-size: 56px; font-weight: 300; color: var(--accent); opacity: 0.2; line-height: 1; margin-bottom: 8px; }
.pillar-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 12px; line-height: 1.3; }
.pillar-text { font-size: 13px; color: var(--text-dim); line-height: 1.7; }

/* TEAM */
.team-section { background: var(--bg2); }
.team-header { max-width: 1200px; margin: 0 auto 60px; display: flex; align-items: flex-end; justify-content: space-between; }
.team-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; max-width: 1200px; margin: 0 auto; align-items: stretch; }
.team-grid > div { display: flex; flex-direction: column; }
.team-card { background: var(--bg); padding: 40px 36px; border: 1px solid var(--border-dim); transition: border-color 0.3s, transform 0.3s; flex: 1; }
.team-card:hover { border-color: var(--border); transform: translateY(-2px); }
.team-photo { width: 72px; height: 72px; border-radius: 50%; background: var(--bg3); border: 1px solid var(--border); margin-bottom: 28px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.team-photo-inner { width: 100%; height: 100%; background: linear-gradient(135deg, var(--bg3), var(--bg2)); display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 24px; color: var(--accent); opacity: 0.6; }
.team-role { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; font-weight: 500; }
.team-name { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 400; color: var(--text); margin-bottom: 16px; }
.team-bio { font-size: 13px; color: var(--text-dim); line-height: 1.75; }

/* VALUE PROP */
.value-section { max-width: 1200px; margin: 0 auto; }
.value-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
.value-items { display: flex; flex-direction: column; gap: 0; }
.value-item { padding: 28px 0; border-bottom: 1px solid var(--border-dim); display: flex; gap: 24px; align-items: flex-start; }
.value-icon { width: 32px; height: 32px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
.value-icon-inner { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
.value-item-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 400; color: var(--text); margin-bottom: 6px; }
.value-item-text { font-size: 13px; color: var(--text-dim); line-height: 1.7; }
.value-callout { background: var(--bg2); border: 1px solid var(--border-dim); padding: 48px; }
.callout-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; font-style: italic; color: var(--text); margin-bottom: 20px; line-height: 1.3; }
.callout-text { font-size: 14px; color: var(--text-mid); line-height: 1.8; }

/* CONTACT */
.contact-section { background: var(--bg2); }
.contact-inner { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 100px; align-items: center; }
.contact-line { display: flex; align-items: center; gap: 20px; padding: 20px 0; border-bottom: 1px solid var(--border-dim); }
.contact-label { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); min-width: 80px; }
.contact-value { font-size: 15px; color: var(--text); font-weight: 300; }
.contact-value a { color: var(--text); text-decoration: none; transition: color 0.3s; }
.contact-value a:hover { color: var(--accent); }

/* FOOTER */
footer { border-top: 1px solid var(--border-dim); background: var(--bg); }
.footer-main { padding: 60px 60px 40px; display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 60px; max-width: 1320px; margin: 0 auto; }
.footer-brand p { font-size: 13px; color: var(--text-dim); line-height: 1.8; margin-top: 16px; max-width: 260px; }
.footer-col-title { font-size: 10px; font-weight: 500; letter-spacing: 0.28em; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; }
.footer-links { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.footer-links a { font-size: 13px; color: var(--text-dim); text-decoration: none; transition: color 0.25s; cursor: pointer; }
.footer-links a:hover { color: var(--text); }
.footer-bottom { border-top: 1px solid var(--border-dim); padding: 20px 60px; max-width: 1320px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-weight: 600; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; }
.footer-legal-links { display: flex; gap: 28px; flex-wrap: wrap; }
.footer-legal-links a { font-size: 11px; color: var(--text-dim); text-decoration: none; transition: color 0.25s; cursor: pointer; letter-spacing: 0.03em; }
.footer-legal-links a:hover { color: var(--text); }
.footer-copy { font-size: 11px; color: var(--text-dim); letter-spacing: 0.03em; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 24px; backdrop-filter: blur(4px); }
.modal-box { background: var(--bg2); border: 1px solid var(--border-dim); max-width: 680px; width: 100%; max-height: 80vh; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 48px; position: relative; }
.modal-box::-webkit-scrollbar { width: 4px; }
.modal-box::-webkit-scrollbar-thumb { background: var(--border); }
.modal-close { position: absolute; top: 20px; right: 24px; background: none; border: none; color: var(--text-dim); font-size: 20px; cursor: pointer; transition: color 0.2s; }
.modal-close:hover { color: var(--text); }
.modal-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; color: var(--text); margin-bottom: 8px; }
.modal-subtitle { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 32px; }
.modal-body { font-size: 13px; color: var(--text-mid); line-height: 1.85; }
.modal-body h3 { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 400; color: var(--text); margin: 28px 0 10px; }
.modal-body p { margin-bottom: 14px; }

/* COOKIE BANNER */
.cookie-banner { position: fixed; bottom: 0; left: 0; right: 0; z-index: 250; background: var(--bg2); border-top: 1px solid var(--border-dim); padding: 20px 60px; display: flex; align-items: center; gap: 32px; flex-wrap: wrap; }
.cookie-text { font-size: 13px; color: var(--text-mid); line-height: 1.6; flex: 1; min-width: 280px; }
.cookie-text a { color: var(--accent); text-decoration: none; cursor: pointer; }
.cookie-actions { display: flex; gap: 12px; flex-shrink: 0; }
.cookie-btn { padding: 10px 24px; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.25s; border: none; }
.cookie-btn-accept { background: var(--accent); color: var(--bg); }
.cookie-btn-accept:hover { opacity: 0.85; }
.cookie-btn-reject { background: transparent; border: 1px solid var(--border-dim); color: var(--text-dim); }
.cookie-btn-reject:hover { border-color: var(--border); color: var(--text); }

/* ── MOBILE ── */
@media (max-width: 768px) {
  nav { padding: 0 20px; }
  .nav-links { display: none; }
  .nav-cta { padding: 7px 16px; font-size: 10px; }

  .hero-content { padding: 0 24px; }
  .hero-scroll { display: none; }

  section { padding: 72px 24px; }

  /* About */
  .about-grid { grid-template-columns: 1fr; gap: 48px; }

  /* Services */
  .services-grid { grid-template-columns: 1fr; }
  .service-card { padding: 32px 24px; }

  /* Philosophy */
  .pillars { flex-direction: column; }
  .pillar { border-left: none; border-top: 1px solid var(--border-dim); padding: 28px 0; }

  /* Team */
  .team-grid { grid-template-columns: 1fr; }
  .team-header { flex-direction: column; align-items: flex-start; gap: 16px; }
  .team-header p { text-align: left; }

  /* Value */
  .value-grid { grid-template-columns: 1fr; gap: 48px; }
  .value-callout { padding: 32px 24px; }

  /* Contact */
  .contact-inner { grid-template-columns: 1fr; gap: 48px; }

  /* Footer */
  .footer-main { grid-template-columns: 1fr 1fr; gap: 40px; padding: 48px 24px 32px; }
  .footer-bottom { padding: 20px 24px; flex-direction: column; align-items: flex-start; gap: 16px; }
  .footer-legal-links { flex-wrap: wrap; gap: 16px; }

  /* Tweaks panel */
  .tweaks-panel { right: 12px; bottom: 12px; width: 220px; padding: 18px; }
}

@media (max-width: 480px) {
  nav { height: 60px; }
  .nav-logo { font-size: 16px; }

  .hero-title { line-height: 0.95; }

  .hero-actions { flex-direction: column; align-items: center; }
  .btn-primary, .btn-outline { width: 100%; max-width: 280px; text-align: center; }

  .about-grid { padding: 72px 20px; }
  .obj-item { padding: 16px; }

  .footer-main { grid-template-columns: 1fr; gap: 32px; padding: 40px 20px 28px; }

  .section-title { line-height: 1.08; }
  .callout-title { font-size: 24px; }

  .contact-line { flex-direction: column; align-items: flex-start; gap: 4px; }
  .contact-label { min-width: unset; }
}

/* TWEAKS PANEL */
.tweaks-panel { position: fixed; bottom: 24px; right: 24px; z-index: 200; background: var(--bg2); border: 1px solid var(--border); padding: 24px; width: 260px; display: none; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
.tweaks-panel.open { display: block; }
.tweaks-title { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; font-weight: 500; }
.tweak-group { margin-bottom: 20px; }
.tweak-label { font-size: 11px; color: var(--text-mid); margin-bottom: 10px; letter-spacing: 0.05em; }
.theme-options { display: flex; gap: 8px; }
.theme-swatch { width: 32px; height: 32px; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; }
.theme-swatch.active { border-color: var(--accent); }
</style>
</head>
<body>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "platino",
  "compactNav": false

function useReveal() {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } }, { threshold: 0.12 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

function Reveal({ children, delay = 0, className = "" }) {
  const [ref, visible] = useReveal();
  return <div ref={ref} className={`reveal ${visible ? 'visible' : ''} ${className}`} style={{ transitionDelay: `${delay}s` }}>{children}</div>;
}

function Globe() {
  const canvasRef = useRef(null);
  const mouseRef = useRef({ x: 0, y: 0 });
  const rafRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const N = 180;
    const R = 220;
    const CONNECTION_DIST = 0.52; // radians
    const PULSE_INTERVAL = 80;

    // Fibonacci sphere
    const pts3d = [];
    const golden = Math.PI * (3 - Math.sqrt(5));
    for (let i = 0; i < N; i++) {
      const y = 1 - (i / (N - 1)) * 2;
      const r = Math.sqrt(1 - y * y);
      const theta = golden * i;
      pts3d.push([Math.cos(theta) * r, y, Math.sin(theta) * r]);
    }

    // Precompute edges (pairs within threshold)
    const edges = [];
    for (let i = 0; i < N; i++) {
      for (let j = i + 1; j < N; j++) {
        const [ax,ay,az] = pts3d[i], [bx,by,bz] = pts3d[j];
        const dot = ax*bx + ay*by + az*bz;
        const ang = Math.acos(Math.max(-1, Math.min(1, dot)));
        if (ang < CONNECTION_DIST) edges.push([i, j, 1 - ang / CONNECTION_DIST]);
      }
    }

    // Build adjacency: for each node, which edges connect to it
    const nodeEdges = Array.from({ length: N }, () => []);
    edges.forEach((e, idx) => {
      nodeEdges[e[0]].push({ idx, other: e[1] });
      nodeEdges[e[1]].push({ idx, other: e[0] });
    });

    // Pulses travel along edges between nodes
    // Each pulse: { from, to, edgeIdx, t, speed, trail[] }
    const pulses = [];
    // Node confluence state: nodeFlash[i] = {age, intensity}
    const nodeFlash = Array(N).fill(null);
    // Track last arrival time per node for confluence detection
    const lastArrival = Array(N).fill(-999);
    let frame = 0;

    function getAccent() {
      const v = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
      return v || '#c9a84c';
    }

    function hexToRgb(hex) {
      const clean = hex.trim().replace(/^#/, '');
      const full = clean.length === 3 ? clean.split('').map(c => c+c).join('') : clean;
      const r = /^([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(full);
      return r ? [parseInt(r[1],16), parseInt(r[2],16), parseInt(r[3],16)] : [201,168,76];
    }

    function spawnPulse(from, excludeEdge = -1) {
      const candidates = nodeEdges[from].filter(e => e.idx !== excludeEdge);
      if (!candidates.length) return;
      const chosen = candidates[Math.floor(Math.random() * candidates.length)];
      pulses.push({
        from, to: chosen.other,
        edgeIdx: chosen.idx,
        t: 0,
        speed: 0.012 + Math.random() * 0.018,
        trail: []
      });
    }

    const MAX_PULSES = 6;
    // Seed initial pulses
    for (let s = 0; s < 3; s++) spawnPulse(Math.floor(Math.random() * N));

    function rotY(pts, a) {
      const c = Math.cos(a), s = Math.sin(a);
      return pts.map(([x,y,z]) => [c*x + s*z, y, -s*x + c*z]);
    }
    function rotX(pts, a) {
      const c = Math.cos(a), s = Math.sin(a);
      return pts.map(([x,y,z]) => [x, c*y - s*z, s*y + c*z]);
    }

    function resize() {
      const W = canvas.parentElement.offsetWidth;
      const H = canvas.parentElement.offsetHeight;
      canvas.width = W; canvas.height = H;
    }
    resize();
    window.addEventListener('resize', resize);

    const onMouse = e => {
      const rect = canvas.getBoundingClientRect();
      mouseRef.current = {
        x: (e.clientX - rect.left - canvas.width / 2) / canvas.width,
        y: (e.clientY - rect.top - canvas.height / 2) / canvas.height
      };
    };
    canvas.addEventListener('mousemove', onMouse);

    let rotAngle = 0;
    function draw() {
      rafRef.current = requestAnimationFrame(draw);
      frame++;
      resize();
      const W = canvas.width, H = canvas.height;
      ctx.clearRect(0, 0, W, H);

      const mx = mouseRef.current.x * 0.4;
      const my = mouseRef.current.y * 0.3;
      rotAngle += 0.003;

      let pts = rotY(pts3d, rotAngle + mx);
      pts = rotX(pts, -0.18 + my);

      const cx = W * 0.72, cy = H * 0.5;
      const fov = 700;

      function project([x, y, z]) {
        const scale = fov / (fov + z * R);
        return [cx + x * R * scale, cy + y * R * scale, z, scale];
      }

      const projected = pts.map(project);

      // Spawn new pulses occasionally — only if under cap
      if (frame % 120 === 0 && pulses.length < MAX_PULSES)
        spawnPulse(Math.floor(Math.random() * N));

      const accent = getAccent();
      const [ar, ag, ab] = hexToRgb(accent);

      // Advance pulses and handle arrivals
      for (let k = pulses.length - 1; k >= 0; k--) {
        const p = pulses[k];
        const [px1, py1] = projected[p.from];
        const [px2, py2] = projected[p.to];
        const cx2 = px1 + (px2 - px1) * p.t;
        const cy2 = py1 + (py2 - py1) * p.t;
        p.trail.push([cx2, cy2]);
        if (p.trail.length > 12) p.trail.shift();
        p.t += p.speed;

        if (p.t >= 1) {
          // Arrived at destination node
          const dest = p.to;
          const timeSinceLastArrival = frame - lastArrival[dest];
          lastArrival[dest] = frame;
          // Confluence: another pulse arrived recently → big flash
          const isConfluence = timeSinceLastArrival < 40;
          nodeFlash[dest] = {
            age: 0,
            maxAge: isConfluence ? 40 : 20,
            intensity: isConfluence ? 1.0 : 0.5,
            confluence: isConfluence
          };
          pulses.splice(k, 1);
          // Chain: only continue if under cap, and only sometimes
          if (pulses.length < MAX_PULSES && Math.random() < 0.5)
            spawnPulse(dest, p.edgeIdx);
        }
      }

      // Draw edges — highlight edges that have active pulses
      const activeEdges = new Set(pulses.map(p => p.edgeIdx));
      for (let ei = 0; ei < edges.length; ei++) {
        const [i, j, strength] = edges[ei];
        const [px1, py1, z1] = projected[i];
        const [px2, py2, z2] = projected[j];
        const depth = ((z1 + z2) / 2 + 1) / 2;
        const isActive = activeEdges.has(ei);
        const alpha = depth * depth * strength * (isActive ? 0.55 : 0.18);
        if (alpha < 0.004) continue;
        ctx.beginPath();
        ctx.moveTo(px1, py1);
        ctx.lineTo(px2, py2);
        ctx.strokeStyle = `rgba(${ar},${ag},${ab},${alpha})`;
        ctx.lineWidth = isActive ? 1.2 : 0.5;
        ctx.stroke();
      }

      // Draw pulse trails + heads
      for (const p of pulses) {
        if (p.trail.length < 2) continue;
        const [px1, py1, pz1] = projected[p.from];
        const [px2, py2, pz2] = projected[p.to];
        const depth = ((pz1 + pz2) / 2 + 1) / 2;
        if (depth < 0.1) continue;

        // Trail
        for (let ti = 1; ti < p.trail.length; ti++) {
          const frac = ti / p.trail.length;
          const [tx1, ty1] = p.trail[ti - 1];
          const [tx2, ty2] = p.trail[ti];
          ctx.beginPath();
          ctx.moveTo(tx1, ty1);
          ctx.lineTo(tx2, ty2);
          ctx.strokeStyle = `rgba(${ar},${ag},${ab},${frac * frac * 0.7 * depth})`;
          ctx.lineWidth = frac * 2.5;
          ctx.stroke();
        }

        // Head glow
        const [hx, hy] = p.trail[p.trail.length - 1];
        const grd = ctx.createRadialGradient(hx, hy, 0, hx, hy, 7 * depth);
        grd.addColorStop(0, `rgba(${ar},${ag},${ab},${0.95 * depth})`);
        grd.addColorStop(0.4, `rgba(${ar},${ag},${ab},${0.4 * depth})`);
        grd.addColorStop(1, `rgba(${ar},${ag},${ab},0)`);
        ctx.beginPath();
        ctx.arc(hx, hy, 7 * depth, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();
      }

      // Draw node flashes (confluences)
      for (let ni = 0; ni < N; ni++) {
        const f = nodeFlash[ni];
        if (!f) continue;
        f.age++;
        if (f.age > f.maxAge) { nodeFlash[ni] = null; continue; }
        const [npx, npy, nz] = projected[ni];
        const depth = (nz + 1) / 2;
        const life = 1 - f.age / f.maxAge;
        const alpha = life * f.intensity * depth;
        const radius = f.confluence
          ? (4 + (1 - life) * 28) * depth
          : (3 + (1 - life) * 14) * depth;
        const grd = ctx.createRadialGradient(npx, npy, 0, npx, npy, radius);
        grd.addColorStop(0, `rgba(${ar},${ag},${ab},${alpha})`);
        grd.addColorStop(0.5, `rgba(${ar},${ag},${ab},${alpha * 0.4})`);
        grd.addColorStop(1, `rgba(${ar},${ag},${ab},0)`);
        ctx.beginPath();
        ctx.arc(npx, npy, radius, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();
        // Bright core on confluence
        if (f.confluence && life > 0.5) {
          ctx.beginPath();
          ctx.arc(npx, npy, 3 * depth, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${(life - 0.5) * 2 * alpha})`;
          ctx.fill();
        }
      }

      // Draw nodes
      for (let i = 0; i < N; i++) {
        const [px, py, z, scale] = projected[i];
        const depth = (z + 1) / 2;
        const alpha = depth * depth * 0.85 + 0.05;
        const r = (depth > 0.7 ? 2.2 : 1.2) * scale;
        ctx.beginPath();
        ctx.arc(px, py, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${ar},${ag},${ab},${alpha * 0.7})`;
        ctx.fill();
      }

      // Outer glow ring
      const grd = ctx.createRadialGradient(cx, cy, R * 0.85, cx, cy, R * 1.15);
      grd.addColorStop(0, `rgba(${ar},${ag},${ab},0)`);
      grd.addColorStop(0.5, `rgba(${ar},${ag},${ab},0.04)`);
      grd.addColorStop(1, `rgba(${ar},${ag},${ab},0)`);
      ctx.beginPath();
      ctx.arc(cx, cy, R * 1.05, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
    }

    draw();
    return () => {
      cancelAnimationFrame(rafRef.current);
      window.removeEventListener('resize', resize);
      canvas.removeEventListener('mousemove', onMouse);
    };
  }, []);

  return (
    <canvas ref={canvasRef} style={{
      position: 'absolute', inset: 0, width: '100%', height: '100%',
      pointerEvents: 'all', opacity: 0.9
    }} />
  );
}

function TweaksPanel({ open }) {
  const [theme, setTheme] = useState(() => {
    const saved = localStorage.getItem('prc-theme');
    return saved || 'platino';
  });

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme === 'gold' ? '' : theme);
    localStorage.setItem('prc-theme', theme);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { theme } }, '*');
  }, [theme]);

  const themes = [
    { id: 'gold', color: '#c9a84c', label: 'Navy & Oro' },
    { id: 'noir', color: '#4db8d4', label: 'Noir & Cian' },
    { id: 'slate', color: '#7c8fff', label: 'Slate & Índigo' },
    { id: 'platino', color: '#4a5058', label: 'Platino' }
  ];

  return (
    <div className={`tweaks-panel ${open ? 'open' : ''}`}>
      <p className="tweaks-title">Tweaks</p>
      <div className="tweak-group">
        <p className="tweak-label">Paleta de color</p>
        <div className="theme-options">
          {themes.map(t => (
            <div key={t.id} title={t.label} className={`theme-swatch ${theme === t.id ? 'active' : ''}`} style={{ background: t.color }} onClick={() => setTheme(t.id)} />
          ))}
        </div>
        <p style={{ fontSize: '11px', color: 'var(--text-dim)', marginTop: '8px' }}>
          {themes.find(t => t.id === theme)?.label}
        </p>
      </div>
    </div>
  );
}

function CookieBanner({ onModal }) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    if (!localStorage.getItem('prc-cookies')) setVisible(true);
  }, []);
  const accept = () => { localStorage.setItem('prc-cookies', 'accepted'); setVisible(false); };
  const reject = () => { localStorage.setItem('prc-cookies', 'rejected'); setVisible(false); };
  if (!visible) return null;
  return (
    <div className="cookie-banner">
      <p className="cookie-text">
        Utilizamos cookies propias y de terceros para mejorar su experiencia. Puede aceptarlas, rechazarlas o consultar nuestra{' '}
        <a onClick={() => onModal('cookies')}>Política de Cookies</a> y{' '}
        <a onClick={() => onModal('privacidad')}>Política de Privacidad</a>.
      </p>
      <div className="cookie-actions">
        <button className="cookie-btn cookie-btn-reject" onClick={reject}>Rechazar</button>
        <button className="cookie-btn cookie-btn-accept" onClick={accept}>Aceptar todas</button>
      </div>
    </div>
  );
}

function App() {
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [modal, setModal] = useState(null);

  useEffect(() => {
    const saved = localStorage.getItem('prc-theme');
    if (saved && saved !== 'gold' || !saved) {
      document.documentElement.setAttribute('data-theme', saved || 'platino');
    }
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  return (
    <>
      <Nav />
      <Hero />
      <About />
      <Services />
      <Philosophy />
      <Team />
      <ValueProp />
      <Contact />
      <Footer onModal={setModal} />
      {modal && <Modal modal={modal} onClose={() => setModal(null)} />}
      <TweaksPanel open={tweaksOpen} />
    </>
  );
}
